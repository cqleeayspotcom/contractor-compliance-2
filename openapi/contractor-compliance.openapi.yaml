  /contractor-compliance/admin/contractors/{phone}/missions:
    get:
      tags: [AdminContractors]
      operationId: adminContractorsMissions
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/PhoneId' }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/contractors/{phone}/compliance-summary:
    get:
      tags: [AdminContractors]
      operationId: adminContractorsComplianceSummary
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/PhoneId' }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/contractors/{phone}/timeline:
    get:
      tags: [AdminContractors]
      operationId: adminContractorsTimeline
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/PhoneId' }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/contractors/{userId}/blocked:
    get:
      tags: [AdminContractors]
      operationId: adminContractorsBlocked
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/UserId' }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/contractors/{userId}/unblock:
    post:
      tags: [AdminContractors]
      operationId: adminContractorsUnblock
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/UserId' }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/contractors/{userId}/purchase-document:
    post:
      tags: [AdminContractors]
      operationId: adminContractorsPurchaseDocument
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/UserId' }]
      requestBody:
        required: true
