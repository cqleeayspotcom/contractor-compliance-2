            type: array
            items: { type: string }
        - name: contractor_phone
          in: query
          required: false
          schema: { type: string }
        - name: contractor_siren
          in: query
          required: false
          schema: { type: string }
        - name: mission_ref
          in: query
          required: false
          schema: { type: string }
        - name: amount_min
          in: query
          required: false
          schema: { type: number }
        - name: amount_max
          in: query
          required: false
          schema: { type: number }
        - name: date_from
          in: query
          required: false
          schema: { type: string, format: date }
        - name: date_to
          in: query
          required: false
          schema: { type: string, format: date }
        - name: validator_missing
          in: query
          required: false
          schema: { type: string, enum: [compliance, production, accounting] }
        - name: missing_validations
          in: query
          required: false
          schema: { type: integer, enum: [1, 2, 3] }
        - name: stale_days
          in: query
          required: false
          schema: { type: integer }
        - name: plan
          in: query
          required: false
          schema: { type: string, enum: [free, pro] }
        - name: paid_disputed
          in: query
          required: false
          schema: { type: boolean }
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

