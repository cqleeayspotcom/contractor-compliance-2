        - name: q
          in: query
          required: false
          schema: { type: string }
          description: Recherche libre (nom / email / phone — appliquée côté repository).
        - name: phone
          in: query
          required: false
          schema: { type: string }
          description: Filtre exact sur le téléphone (`cc_users.phone`).
        - name: email
          in: query
          required: false
          schema: { type: string }
          description: Filtre exact sur l'email (`cc_users.email`).
        - name: order
          in: query
          required: false
          schema: { type: string, enum: [asc, desc] }
          description: |
            Ordre de tri (le controller lit `order`, pas `direction`).
            Défaut backend `desc`.
        - name: account_state
          in: query
          required: false
          schema: { type: string }
        - name: plan
          in: query
          required: false
          schema: { type: string }
        - name: kyc_status
          in: query
          required: false
          schema: { type: string, enum: [approved, rejected, pending, none] }
        - name: compliance
          in: query
          required: false
          schema: { type: string, enum: [compliant, partial, blocked] }
        - name: has_active_invoice
          in: query
          required: false
          schema: { type: boolean }
        - name: has_stuck_invoice
          in: query
          required: false
          schema: { type: boolean }
        - name: city
          in: query
          required: false
          schema: { type: string }
        - name: department
          in: query
          required: false
          schema: { type: string }
        - name: created_after
          in: query
          required: false
          schema: { type: string, format: date }
        - name: created_before
          in: query
          required: false
          schema: { type: string, format: date }
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

