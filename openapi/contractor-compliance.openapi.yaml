  # ============================================================
  # Domaine 03 — KYC mobile public (capability link)
  # ============================================================
  /contractor-compliance/kyc/mobile/{token}:
    get:
      tags: [KycMobile]
      # Route publique (capability link). Pas de security -> security: []
      # POURQUOI : le token 48-hex sert lui-meme de capability, pas de cookie.
      operationId: kycMobileValidateToken
      security: []
      parameters: [{ $ref: '#/components/parameters/Token' }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }
        '404':
          description: Token inconnu
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '410':
          description: Token expire ou deja consomme
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /contractor-compliance/kyc/mobile/{token}/video:
    post:
      tags: [KycMobile]
      # Route publique : upload video KYC via capability link.
      operationId: kycMobileSubmitVideo
      security: []
      parameters: [{ $ref: '#/components/parameters/Token' }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                video: { type: string, format: binary }
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }
        '400':
          description: Video invalide (taille, MIME, format)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Token inconnu
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '410':
          description: Token expire ou deja consomme
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

