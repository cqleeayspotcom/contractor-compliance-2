  /contractor-compliance/invoices/free/{uuid}/upload:
    post:
      tags: [InvoicesFree]
      operationId: invoicesFreeUpload
      security: [{ contractorCookie: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  # ============================================================
  # Domaine 06 — Free invoices PUBLIC pay (capability uuid)
  # ============================================================
  /contractor-compliance/pay/free-invoice/{uuid}:
