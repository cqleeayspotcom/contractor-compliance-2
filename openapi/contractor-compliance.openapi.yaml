openapi: 3.0.3
info:
  title: Contractor Compliance API (Tuita-integrated)
  description: |
    SDK source for `frontend-tuita-contractor-compliance`.
    GÉNÉRÉ HORS-LIGNE à partir des routes Laminas réelles du module
    `platform-backend/module/ContractorCompliance/config/domains/*.config.php`.

    IMPORTANT : ce spec n'est PAS produit par api-tools-documentation.
    Source de vérité = les fichiers de configuration de routes du module.
    Les schémas request/response sont volontairement génériques
    (`type: object, additionalProperties: true`) — le SDK fournit la bonne
    URL + méthode HTTP + paramètres de route ; les payloads restent
    typés librement côté frontend.

    Routes alignées Tuita (sans préfixe `/api/`).
  version: '2.0.0'
servers:
  - url: ''
    description: Backend Tuita (même origine, proxy géré par proxy.conf.json)
security: []
components:
  securitySchemes:
    contractorCookie:
      type: apiKey
      in: cookie
      name: __contractor_ssid
      description: |
        Session contractor Tuita émise par `ContractorModule\V1\Rpc\ContractorAuthAction`
        (PIN SMS via MySmsSender). Utilisée pour toutes les routes
        `/contractor-compliance/*` HORS admin et HORS pay public.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: OAuth2
      description: |
        Bearer OAuth2 Tuita (api-tools-oauth2) + CLEARANCE_STAFF_ONLY.
        Utilisée pour toutes les routes `/contractor-compliance/admin/*`.
  schemas:
    JsonObject:
      type: object
      additionalProperties: true
    JsonArray:
      type: array
      items:
        type: object
        additionalProperties: true
    Empty:
      type: object
    # ============================================================
    # Enveloppe API canonique (cf. trait PHP `ApiEnvelope`).
    # Toute réponse JSON du module respecte une de ces deux formes :
    #
    #   Succès (HTTP 2xx) : { data: <payload>, meta?: <pagination/etc> }
    #   Erreur (HTTP 4xx/5xx) : { error: { code, message, details? } }
    #
    # Le statut HTTP fait foi — pas de flag `success` redondant.
    # ============================================================
    SuccessEnvelope:
      type: object
      required: [data]
      properties:
        data:
          description: Payload métier — type variable selon l'endpoint.
        meta:
          type: object
          additionalProperties: true
          description: Métadonnées optionnelles (pagination, cursors, etc.).
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: "Code machine-readable (ex: INVITATION_CODE_NOT_FOUND). Stable, utilisé par le frontend pour brancher la logique."
        message:
          type: string
          description: "Message en français, prêt à afficher à l'utilisateur final tel quel."
        details:
          type: object
          additionalProperties: true
          description: "Détails optionnels (ex: champ en faute, contexte). Format libre par endpoint."
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: { $ref: '#/components/schemas/ApiError' }
    # Alias legacy — conservé temporairement pour compat.
    ErrorResponse:
      $ref: '#/components/schemas/ErrorEnvelope'

    # ============================================================
    # Missions contractor — schémas typés depuis le chantier 8.
    # Sources backend :
    #   - ContractorCompliance\Service\Mission\MissionView::toArray()
    #   - ContractorCompliance\Service\Mission\OfferView::toArray()
    #   - ContractorCompliance\Service\Mission\MissionListResult::getMeta()
    # ============================================================
    InvoiceStatusFront:
      type: string
      enum:
        - none                  # aucune facture — signal Freemium "à facturer"
        - validating            # OCR en cours
        - pending_validation    # triple validation Tuita en cours
        - ready_to_pay          # 3/3 OK, drapeau "à payer"
        - paying                # virement lancé par la compta
        - paid                  # virement confirmé (terminal)
        - uploaded              # générique freemium
        - auto_generated        # générique Pro (auto Tuita)
        - rejected              # rejetée, à refaire
      description: |
        9 statuts de facture exposés au front contractor. Mapping interne
        14 statuts -> 9 réalisé dans InvoiceStatusMapper côté backend.
    ContractorMission:
      type: object
      required:
        - mid
        - caseNumber
        - missionTitle
        - operationType
        - operationTypeLabel
        - price
        - canRun
        - invoice_status
      properties:
        mid:
          type: string
          description: ID Tuita de la MissionStatement (= primary key affichable).
        missionUid:
          type: string
          nullable: true
          description: Identifiant unique court côté contractor (cm.mission_uid).
        caseNumber:
          type: string
          description: Référence dossier (CMD-XXX / opportunity caseNumber).
        missionTitle:
          type: string
        operationType:
          type: string
          description: "Clé technique : ridge, gutter, previsit, starlink, etc."
        operationTypeLabel:
          type: string
          description: Libellé humain (lookup ValueRegistry ROOFING_OPERATION_TYPE).
        price:
          type: number
          format: float
          description: "Prix contractor en € (depuis cft_smith_contract.price, round 2)."
        targetAddress:
          type: string
          nullable: true
          description: |
            Adresse VAGUE (postal_code + city). Pas la rue / numéro
            (consigne business anti-court-circuit).
        city:
          type: string
          nullable: true
        visitDateConfirmed:
          type: string
          format: date-time
          nullable: true
        signedAt:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601, date de signature de la mission (réalisée si non-null).
        canRun:
          type: boolean
          description: Ce contractor peut-il piloter la mission (master vs secondary).
        invoice_status:
          $ref: '#/components/schemas/InvoiceStatusFront'
        invoice_uuid:
          type: string
          format: uuid
          nullable: true
        invoice_number:
          type: string
          nullable: true
          description: Numéro de facture contractor si présent.
        mission_ref:
          type: string
          description: Alias snake_case de caseNumber (rétrocompat admin).
    MissionsMeta:
      type: object
      required:
        - total
        - filtered_total
        - page
        - per_page
        - last_page
        - realized
        - realized_to_invoice
        - invoice_status_counts
      properties:
        total:
          type: integer
          description: Total brut (avant filtres).
        filtered_total:
          type: integer
          description: Total après filtres (= taille effective).
        page:
          type: integer
        per_page:
          type: integer
        last_page:
          type: integer
        realized:
          type: integer
          description: Nombre de missions avec signedAt != null.
        realized_to_invoice:
          type: integer
          description: |
            Missions réalisées dont l'invoice_status est none ou rejected
            (= action upload facture requise côté Freemium).
        invoice_status_counts:
          type: object
          additionalProperties:
            type: integer
          description: "Map { 'none' => N, 'paid' => N, ... } sur les 9 statuts front."
        links:
          type: object
          properties:
            self:  { type: string, nullable: true }
            first: { type: string, nullable: true }
            last:  { type: string, nullable: true }
            next:  { type: string, nullable: true }
            prev:  { type: string, nullable: true }
    ContractorMissionListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/ContractorMission' }
        meta:
          $ref: '#/components/schemas/MissionsMeta'
    ContractorMissionDetailResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ContractorMission'
    MissionOfferCategory:
      type: string
      enum: [pre_visite, fibre, btp, autre]
      description: Catégorie front (mapping depuis DxMission.missionType).
    MissionOfferAddress:
      type: object
      required: [street, city, postal_code, department]
      properties:
        street:
          type: string
          description: |
            Vide côté liste offres (consigne anti-court-circuit). La rue
            n'est révélée qu'après acceptation effective sur une autre route.
        city:
          type: string
        postal_code:
          type: string
        department:
          type: string
          description: Code département (2 chiffres) dérivé du postal_code.
    MissionOffer:
      type: object
      required:
        - mission_ref
        - title
        - category
        - scheduled_at
        - address
        - description_short
        - required_badges
        - expires_at
        - offered_at
      properties:
        mission_ref:
          type: string
          description: Référence mission (= DxMission.caseNumber).
        title:
          type: string
        category:
          $ref: '#/components/schemas/MissionOfferCategory'
        expected_amount_ttc:
          type: number
          format: float
          nullable: true
          description: Montant TTC attendu en €.
        scheduled_at:
          type: string
          format: date-time
        address:
          $ref: '#/components/schemas/MissionOfferAddress'
        description_short:
          type: string
        required_badges:
          type: array
          items: { type: string }
          description: Certifications requises pour accepter (vide pour l'instant côté Tuita).
        expires_at:
          type: string
          format: date-time
        offered_at:
          type: string
          format: date-time
    MissionOffersMeta:
      type: object
      required: [total, page, per_page, last_page, can_accept]
      properties:
        total:      { type: integer }
        page:       { type: integer }
        per_page:   { type: integer }
        last_page:  { type: integer }
        can_accept:
          type: boolean
          description: |
            False quand le contractor n'est pas encore fully_verified.
            Le front affiche les offres mais désactive accept/decline.
        links:
          type: object
          properties:
            self:  { type: string, nullable: true }
            first: { type: string, nullable: true }
            last:  { type: string, nullable: true }
            next:  { type: string, nullable: true }
            prev:  { type: string, nullable: true }
    MissionOffersListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/MissionOffer' }
        meta:
          $ref: '#/components/schemas/MissionOffersMeta'
    AdminInvitationCodeCreateRequest:
      type: object
      # Contrat strict : seules ces 4 clés sont acceptées, generated_by_label
      # obligatoire. additionalProperties=false évite qu'une clé mal nommée
      # (ex. l'ancien valid_for_days) passe inaperçue côté SDK.
      additionalProperties: false
      required: [generated_by_label]
      properties:
        generated_by_label:
          type: string
          minLength: 2
          description: |
            Qui crée le code (email/nom Tuita). Obligatoire — le backend
            rejette la création avec VALIDATION_FAILED
            « generated_by_label est obligatoire » si le champ est vide.
        note:
          type: string
          nullable: true
          description: À qui le code est destiné (audit + heuristique mismatch).
        max_uses:
          type: integer
          nullable: true
          description: Nombre maximal d'usages ; null = illimité.
        expires_in_days:
          type: integer
          default: 7
          minimum: 1
          maximum: 365
          description: |
            Durée de validité en jours, lue par le backend (défaut 7,
            bornée 1–365).
    CertificationHeartbeatRequest:
      type: object
      required: [attempt_uuid]
      properties:
        attempt_uuid:
          type: string
          format: uuid
          description: UUID de la tentative QCM active à prolonger.
    CertificationAnswersRequest:
      type: object
      # POURQUOI attempt_uuid dans le body : le backend identifie la
      # tentative par attempt_uuid lu dans le corps JSON, jamais par un
      # segment d'URL (la PK QcmAttempt est un UUID).
      required: [attempt_uuid, answers]
      properties:
        attempt_uuid:
          type: string
          format: uuid
          description: UUID de la tentative QCM.
        answers:
          type: object
          additionalProperties: { type: string }
          description: |
            Réponses du QCM indexées par numéro de question (1..24) → A/B/C.
            Complètes pour /complete, partielles autorisées pour /answers.
  parameters:
    Uuid:
      name: uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionUuid:
      name: sessionUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PhoneId:
      name: phone
      in: path
      required: true
      schema:
        type: string
        pattern: '^P\d+$'
      description: Identifiant contractor format `P<digits>` (Tuita phone-keyed).
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
    MissionRef:
      name: missionRef
      in: path
      required: true
      schema:
        type: string
    Ref:
      name: ref
      in: path
      required: true
      schema:
        type: string
    Token:
      name: token
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-f0-9]{48}$'
    KeyParam:
      name: key
      in: path
      required: true
      schema:
        type: string
    CodeParam:
      name: code
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9]{4}$'
    ServiceParam:
      name: service
      in: path
      required: true
      schema:
        type: string
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
    # ----- Query params communs (pagination / tri / filtres) -----
    QueryPage:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1 }
    QueryPerPage:
      name: per_page
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 200 }
    QuerySort:
      name: sort
      in: query
      required: false
      schema: { type: string }
    QueryDirection:
      name: direction
      in: query
      required: false
      schema: { type: string, enum: [asc, desc] }
    QuerySearch:
      name: search
      in: query
      required: false
      schema: { type: string }
    QueryStatus:
      name: status
      in: query
      required: false
      schema: { type: string }
    QueryPhone:
      name: phone
      in: query
      required: false
      schema: { type: string }
    QueryStuck:
      name: stuck
      in: query
      required: false
      schema: { type: boolean }
    QueryInline:
      name: inline
      in: query
      required: false
      schema: { type: boolean }
      description: "Si `true`, force `Content-Disposition: inline` pour preview navigateur."
    QueryFailureReason:
      name: failure_reason
      in: query
      required: false
      schema: { type: string }
    QueryInvoiceStatus:
      name: invoice_status
      in: query
      required: false
      schema: { type: string }
    QueryType:
      name: type
      in: query
      required: false
      schema: { type: string }
    QueryDocumentType:
      name: document_type
      in: query
      required: false
      schema: { type: string }
    QuerySince:
      name: since
      in: query
      required: false
      schema: { type: string, format: date }
      description: "Borne basse de période (YYYY-MM-DD)."
    QueryUntil:
      name: until
      in: query
      required: false
      schema: { type: string, format: date }
      description: "Borne haute de période (YYYY-MM-DD)."
    QueryDir:
      name: dir
      in: query
      required: false
      schema: { type: string, enum: [asc, desc] }
      description: "Sens de tri des sous-listes admin (param `dir`, distinct de `direction`)."
    QueryWithoutInvoice:
      name: without_invoice
      in: query
      required: false
      schema: { type: boolean }
      description: "Si `true`, ne renvoie que les éléments sans facture associée."
    QueryIncludeOldVersions:
      name: include_old_versions
      in: query
      required: false
      schema: { type: boolean }
      description: "Inclut les anciennes versions de documents (re-uploads, renouvellements)."
    QueryArtifactPath:
      name: path
      in: query
      required: true
      schema: { type: string }
      description: Chemin relatif de l'artifact KYC à streamer (.webm, .jpg…).
  responses:
    # ----- Réponse binaire générique (PDF / image / vidéo) -----
    BinaryOk:
      description: Fichier binaire (PDF / image / vidéo).
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
    JsonOk:
      description: "Succès — enveloppe data/meta?."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'
    JsonError:
      description: "Erreur — enveloppe error.code / error.message / error.details?."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ContractorMissionListOk:
      description: "Liste paginée + filtrée des missions attribuées au contractor."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ContractorMissionListResponse'
    ContractorMissionDetailOk:
      description: "Détail d'une mission attribuée pour le contractor connecté."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ContractorMissionDetailResponse'
    MissionOffersOk:
      description: "Liste paginée des offres SuperDispatch en attente d'acceptation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MissionOffersListResponse'
tags:
  - name: Signup
  - name: Profile
  - name: Dashboard
  - name: Documents
  - name: Billing
  - name: Kyc
  - name: KycMobile
  - name: Invoices
  - name: InvoicesFree
  - name: Missions
  - name: Certification
  - name: PayPublic
  - name: Admin
  - name: AdminContractors
  - name: AdminInvoices
  - name: AdminFreeInvoices
  - name: AdminKyc
  - name: AdminPurchases
  - name: AdminWebhooks
  - name: AdminDocuments
  - name: AdminCircuitBreakers
  - name: AdminInvitationCodes
  - name: AdminSettings
  - name: AdminSupervision
  - name: AdminAuth
paths:

  # ============================================================
  # Domaine 01 — Auth admin (pré-auth, demande de PIN par email)
  # POURQUOI tag dédié AdminAuth : endpoint pré-authentification
  # (security: []), pas concerné par bearerAuth comme le reste
  # de l'admin.
  # ============================================================
  /contractor-compliance/admin/auth/request-pin:
    post:
      tags: [AdminAuth]
      operationId: adminAuthRequestPin
      summary: Demande d'un PIN admin par email (relais OAuth2 staff).
      description: |
        Pré-authentification staff/admin : l'utilisateur fournit son email,
        le backend génère un PIN (oauth_user_sms_token), le diffuse via
        Slack et/ou les logs applicatifs, puis renvoie un `sms_trip_token`
        à passer en header `Sms-Trip` sur le POST /signin OAuth2 suivant.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  description: Email ou username staff (recherche permissive sur oauth_users).
      responses:
        '200':
          description: PIN généré et diffusé. `sms_trip_token` à utiliser sur le signin.
          content:
            application/json:
              schema:
                type: object
                required: [sms_trip_token, expires_at, pincode_media]
                properties:
                  sms_trip_token:
                    type: string
                    description: Token éphémère à passer en header `Sms-Trip` au signin.
                  expires_at:
                    type: string
                    description: Date d'expiration du PIN (format Y-m-d H:i:s).
                  pincode_media:
                    type: string
                    enum: [log, slack]
                    description: Canal de diffusion effectif du PIN (slack si dispo, log sinon).
        '401':
          description: Email inconnu, désactivé ou non staff.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422':
          description: Email manquant ou invalide.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        default: { $ref: '#/components/responses/JsonError' }

  # ============================================================
  # Domaine 01 — Auth / profile / dashboard
  # ============================================================

  # --- Signup public (pas d'auth) ---
  /contractor-compliance/invitation-codes/check:
    get:
      tags: [Signup]
      operationId: invitationCodesCheck
      summary: Pré-validation d'un code d'invitation (lecture seule, ne consomme pas).
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9]{4}$'
          description: Code d'invitation 4 caractères (alphabet `[A-HJ-NP-Z2-9]`).
      responses:
        '200':
          description: Résultat de la vérification (200 même si le code est invalide — voir `data.valid`).
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [valid]
                    properties:
                      valid: { type: boolean }
                      reason:
                        type: string
                        enum: [invalid_format, not_found, revoked, expired, exhausted]
                        description: "Présent uniquement quand valid=false."
        default: { $ref: '#/components/responses/JsonError' }

  /contractor-compliance/signup:
    post:
      tags: [Signup]
      operationId: signupCreate
      summary: Inscription publique par code d'invitation. Pose le cookie `__contractor_ssid`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, phone, email]
              properties:
                code: { type: string, pattern: '^[A-Za-z0-9]{4}$' }
                phone: { type: string }
                email: { type: string, format: email }
                first_name: { type: string }
                last_name: { type: string }
                siren: { type: string }
                company_name: { type: string }
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }
        default: { $ref: '#/components/responses/JsonError' }

  /contractor-compliance/profile/logout:
    post:
      tags: [Profile]
      operationId: profileLogout
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }
        default: { $ref: '#/components/responses/JsonError' }

  # Alignement Laravel (2026-05-19) : GET (lecture) + PATCH (update delta)
  # sur /profile/notifications. L'ancien combo GET+POST /notifications/preferences
  # a été retiré côté backend (cf. 01-auth.config.php). Le dispatch verbe
  # est résolu dans ContractorDashboardController::notificationsPreferencesAction
  # via $request->isPatch().
  /contractor-compliance/profile/notifications:
    get:
      tags: [Profile]
      operationId: profileNotificationsGet
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }
    patch:
      tags: [Profile]
      operationId: profileNotificationsUpdate
      security: [{ contractorCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JsonObject' }
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/dashboard:
    get:
      tags: [Dashboard]
      operationId: dashboardIndex
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/profile/bank-details:
    get:
      tags: [Profile]
      operationId: profileBankDetailsGet
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }
    patch:
      tags: [Profile]
      operationId: profileBankDetailsUpdate
      security: [{ contractorCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JsonObject' }
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  # ============================================================
  # Domaine 02 — Documents + billing
  # ============================================================
  /contractor-compliance/documents/upload:
    post:
      tags: [Documents]
      operationId: documentsUpload
      security: [{ contractorCookie: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
