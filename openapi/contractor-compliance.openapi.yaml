  /contractor-compliance/certification/status:
    get:
      tags: [Certification]
      operationId: certificationStatus
      security: [{ contractorCookie: [] }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/certification/start:
    post:
      tags: [Certification]
      operationId: certificationStart
      security: [{ contractorCookie: [] }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/certification/qcm/start:
    post:
      tags: [Certification]
      operationId: certificationQcmStart
      security: [{ contractorCookie: [] }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/certification/qcm/{attempt}/submit:
    post:
      tags: [Certification]
      operationId: certificationQcmSubmit
      security: [{ contractorCookie: [] }]
      parameters: [{ $ref: '#/components/parameters/Attempt' }]
      requestBody:
        required: true
