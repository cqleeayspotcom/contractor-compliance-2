openapi: 3.0.3
info:
  title: Contractor Compliance API (Tuita-integrated)
  description: |
    SDK source for `frontend-tuita-contractor-compliance`.
    GÉNÉRÉ HORS-LIGNE à partir des routes Laminas réelles du module
    `platform-backend/module/ContractorCompliance/config/domains/*.config.php`.

    IMPORTANT : ce spec n'est PAS produit par api-tools-documentation.
    Source de vérité = les fichiers de configuration de routes du module.
    Les schémas request/response sont volontairement génériques
    (`type: object, additionalProperties: true`) — le SDK fournit la bonne
    URL + méthode HTTP + paramètres de route ; les payloads restent
    typés librement côté frontend.

    Routes alignées Tuita (sans préfixe `/api/`).
  version: '2.0.0'
servers:
  - url: ''
    description: Backend Tuita (même origine, proxy géré par proxy.conf.json)
security: []
components:
  securitySchemes:
    contractorCookie:
      type: apiKey
      in: cookie
      name: __contractor_ssid
      description: |
        Session contractor Tuita émise par `ContractorModule\V1\Rpc\ContractorAuthAction`
        (PIN SMS via MySmsSender). Utilisée pour toutes les routes
        `/contractor-compliance/*` HORS admin et HORS pay public.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: OAuth2
      description: |
        Bearer OAuth2 Tuita (api-tools-oauth2) + CLEARANCE_STAFF_ONLY.
        Utilisée pour toutes les routes `/contractor-compliance/admin/*`.
  schemas:
    JsonObject:
      type: object
      additionalProperties: true
    JsonArray:
      type: array
      items:
        type: object
        additionalProperties: true
    Empty:
      type: object
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        detail:
          type: object
          additionalProperties: true
  parameters:
    Uuid:
      name: uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionUuid:
      name: sessionUuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PhoneId:
      name: phone
      in: path
      required: true
      schema:
        type: string
        pattern: '^P\d+$'
      description: Identifiant contractor format `P<digits>` (Tuita phone-keyed).
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
    MissionRef:
      name: missionRef
      in: path
      required: true
      schema:
        type: string
    Ref:
      name: ref
      in: path
      required: true
      schema:
        type: string
    Attempt:
      name: attempt
      in: path
      required: true
      schema:
        type: integer
    Token:
      name: token
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-f0-9]{48}$'
    KeyParam:
      name: key
      in: path
      required: true
      schema:
        type: string
    CodeParam:
      name: code
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9]{4}$'
    ServiceParam:
      name: service
      in: path
      required: true
      schema:
        type: string
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
  responses:
    JsonOk:
      description: OK
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/JsonObject'
    JsonError:
      description: Erreur applicative
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
tags:
  - name: Profile
  - name: Dashboard
  - name: Documents
  - name: Billing
  - name: Kyc
  - name: KycMobile
  - name: Invoices
  - name: InvoicesFree
  - name: Missions
  - name: Certification
  - name: PayPublic
  - name: Admin
  - name: AdminContractors
  - name: AdminInvoices
  - name: AdminFreeInvoices
  - name: AdminKyc
  - name: AdminPurchases
  - name: AdminWebhooks
  - name: AdminDocuments
  - name: AdminCircuitBreakers
  - name: AdminInvitationCodes
  - name: AdminSettings
  - name: AdminSupervision
paths:

  # ============================================================
  # Domaine 01 — Auth / profile / dashboard
  # ============================================================
  /contractor-compliance/profile/logout:
    post:
      tags: [Profile]
      operationId: profileLogout
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }
        default: { $ref: '#/components/responses/JsonError' }

  /contractor-compliance/profile/notifications:
    get:
      tags: [Profile]
      operationId: profileNotifications
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/dashboard:
    get:
      tags: [Dashboard]
      operationId: dashboardIndex
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/notifications/preferences:
    get:
      tags: [Dashboard]
      operationId: notificationsPreferencesGet
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }
    post:
      tags: [Dashboard]
      operationId: notificationsPreferencesUpdate
      security: [{ contractorCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JsonObject' }
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/profile/bank-details:
    get:
      tags: [Profile]
      operationId: profileBankDetailsGet
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }
    patch:
      tags: [Profile]
      operationId: profileBankDetailsUpdate
      security: [{ contractorCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JsonObject' }
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  # ============================================================
  # Domaine 02 — Documents + billing
  # ============================================================
  /contractor-compliance/documents/upload:
    post:
      tags: [Documents]
      operationId: documentsUpload
      security: [{ contractorCookie: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                type: { type: string }
                file: { type: string, format: binary }
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/documents:
    get:
      tags: [Documents]
      operationId: documentsList
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/documents/{uuid}:
    get:
      tags: [Documents]
      operationId: documentsGet
      security: [{ contractorCookie: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/documents/purchase:
    post:
      tags: [Documents]
      operationId: documentsPurchase
      security: [{ contractorCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JsonObject' }
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/billing/subscription:
    get:
      tags: [Billing]
      operationId: billingSubscription
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/billing/subscribe:
    post:
      tags: [Billing]
      operationId: billingSubscribe
      security: [{ contractorCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JsonObject' }
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/billing/cancel:
    post:
      tags: [Billing]
      operationId: billingCancel
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/billing/payment-history:
    get:
      tags: [Billing]
      operationId: billingPaymentHistory
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  # ============================================================
  # Domaine 03 — KYC contractor
  # ============================================================
  /contractor-compliance/kyc/challenge:
    get:
      tags: [Kyc]
      operationId: kycChallenge
      security: [{ contractorCookie: [] }]
      responses:
        '200': { $ref: '#/components/responses/JsonOk' }

  /contractor-compliance/kyc/video:
    post:
      tags: [Kyc]
      operationId: kycVideo
      security: [{ contractorCookie: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                video: { type: string, format: binary }
      responses:
