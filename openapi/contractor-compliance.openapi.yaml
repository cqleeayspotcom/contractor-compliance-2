        - { $ref: '#/components/parameters/QueryDirection' }
        - name: q
          in: query
          required: false
          schema: { type: string }
        - name: status[]
          in: query
          required: false
          description: "Filtre multi-statuts (onglets). Sérialisé `status[]=a&status[]=b`."
