  /contractor-compliance/admin/settings:
    get:
      tags: [AdminSettings]
      operationId: adminSettingsList
      security: [{ bearerAuth: [] }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
    patch:
      tags: [AdminSettings]
      operationId: adminSettingsBatchUpdate
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
