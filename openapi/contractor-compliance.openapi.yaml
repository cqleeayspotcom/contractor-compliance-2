        - { $ref: '#/components/parameters/QueryPage' }
        - { $ref: '#/components/parameters/QueryPerPage' }
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/payment-in-progress:
    get:
      tags: [AdminInvoices]
      operationId: adminInvoicesPaymentInProgress
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/QueryStuck' }
        - { $ref: '#/components/parameters/QueryPage' }
        - { $ref: '#/components/parameters/QueryPerPage' }
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/today-payments:
    get:
      tags: [AdminInvoices]
      operationId: adminInvoicesTodayPayments
      security: [{ bearerAuth: [] }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/paid-disputed:
    get:
      tags: [AdminInvoices]
      operationId: adminInvoicesPaidDisputed
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/QueryStuck' }
        - { $ref: '#/components/parameters/QueryPage' }
        - { $ref: '#/components/parameters/QueryPerPage' }
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}:
    get:
      tags: [AdminInvoices]
      operationId: adminInvoicesShow
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/pdf:
    get:
      tags: [AdminInvoices]
      operationId: adminInvoicesPdf
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: '#/components/parameters/Uuid' }
        - { $ref: '#/components/parameters/QueryInline' }
      responses:
        '200': { $ref: '#/components/responses/BinaryOk' }

  /contractor-compliance/admin/invoices/{uuid}/audit-trail:
    get:
      tags: [AdminInvoices]
      operationId: adminInvoicesAuditTrail
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/mark-payment-in-progress:
    post:
      tags: [AdminInvoices]
      operationId: adminInvoicesMarkPaymentInProgress
      summary: Transition `ready_to_pay` → `payment_in_progress` (idempotente).
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                admin_email:
                  type: string
                  format: email
                  description: |
                    Identité de l'admin actant la transition (fallback :
                    identité OAuth2 du bearer). Tracé dans la timeline
                    + audit log.
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/mark-paid:
    post:
      tags: [AdminInvoices]
      operationId: adminInvoicesMarkPaid
      summary: Marque la facture comme payée (transition terminale).
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_ref, admin_email]
              properties:
                payment_ref:
                  type: string
                  description: Référence virement bancaire (obligatoire, masquée en logs).
                admin_email:
                  type: string
                  format: email
                paid_at:
                  type: string
                  format: date-time
                  description: Date de paiement effective (ISO 8601). Défaut = maintenant.
                fast_path:
                  type: object
                  additionalProperties: true
                  description: Bag opaque transmis au MarkPaidService (chemins accélérés).
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/reopen:
    post:
      tags: [AdminInvoices]
      operationId: adminInvoicesReopen
      summary: Rouvre une facture `rejected` vers `draft` (corrige & re-pipeline).
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 10
                  description: Motif de la réouverture (≥10 caractères, archivé dans `reopen_reason`).
                admin_email:
                  type: string
                  format: email
                  description: Fallback identité OAuth2 si absent.
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/resolve-dispute:
    post:
      tags: [AdminInvoices]
      operationId: adminInvoicesResolveDispute
      summary: Alias historique de `dispute` (J5 stub) — déclenche `transitionToDispute`.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Motif du litige.
                admin_email:
                  type: string
                  format: email
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/force-resend-webhook:
    post:
      tags: [AdminInvoices]
      operationId: adminInvoicesForceResendWebhook
      summary: Reset le flag `webhook_<event>_sent_at` et redispatch l'event.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  type: string
                  enum:
                    - rejected
                    - ready_to_pay
                    - payment_in_progress
                    - paid
                    - reopened
                    - cancelled
                  description: Nom de l'event à re-émettre (une seule famille par appel).
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/add-note:
    post:
      tags: [AdminInvoices]
      operationId: adminInvoicesAddNote
      summary: Ajoute une note admin sur la facture (timeline + InvoiceAdminNote).
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # Le backend accepte `content` OU `note` (alias historique).
              properties:
                content:
                  type: string
                  description: Contenu de la note (préféré).
                note:
                  type: string
                  description: Alias historique de `content`.
                admin_email:
                  type: string
                  format: email
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/validate:
    post:
      tags: [AdminInvoices]
      operationId: adminInvoicesValidate
      summary: |
        Enregistre une décision admin (approved/rejected). À la 3ᵉ approbation,
        la facture bascule en `ready_to_pay` (cf. InvoicePaymentValidationProcessor).
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, admin_email]
              properties:
                decision:
                  type: string
                  enum: [approved, rejected]
                admin_email:
                  type: string
                  format: email
                reason_code:
                  type: string
                  description: Code de motif structuré (préférence sur `reason`).
                reason:
                  type: string
                  description: Motif texte libre (fallback de `reason_code`).
                correlation_id:
                  type: string
                  description: ID de corrélation (généré si absent).
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/cancel:
    post:
      tags: [AdminInvoices]
      operationId: adminInvoicesCancel
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/dispute:
    post:
      tags: [AdminInvoices]
      operationId: adminInvoicesDispute
      summary: Bascule la facture en `disputed`.
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                admin_email:
                  type: string
                  format: email
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/expire:
    post:
      tags: [AdminInvoices]
      operationId: adminInvoicesExpire
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/reject:
    post:
      tags: [AdminInvoices]
      operationId: adminInvoicesReject
      summary: Rejette admin direct (alternative à `validate decision=rejected`).
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Motif du rejet (obligatoire).
                admin_email:
                  type: string
                  format: email
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/export:
    get:
      tags: [AdminInvoices]
      operationId: adminInvoicesExport
      security: [{ bearerAuth: [] }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }

  /contractor-compliance/admin/invoices/{uuid}/send-validator-reminder:
    post:
      tags: [AdminInvoices]
      operationId: adminInvoicesSendValidatorReminder
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/Uuid' }]
      responses: { '200': { $ref: '#/components/responses/JsonOk' } }
