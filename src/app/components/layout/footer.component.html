<!-- Réplique du footer de tuita.fr, propre à cette micro-app. À la fusion -->
<!-- dans le frontend tuita, remplacer par le vrai footer partagé de       -->
<!-- tuita.fr (voir footer.component.ts).                                  -->
<footer class="tuita-footer">
  <div class="tuita-footer__inner">
    <span class="tuita-footer__copyright">
      &copy; {{ currentYear }} {{ companyInfo.name }}
    </span>
    <nav class="tuita-footer__links">
      <a *ngFor="let link of legalLinks"
         class="tuita-footer__link"
         [href]="link.path"
         target="_blank"
         rel="noopener">
        {{ link.label }}
      </a>
    </nav>
  </div>
</footer>
