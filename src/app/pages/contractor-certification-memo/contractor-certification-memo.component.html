<section class="cmemo">
  <header class="cmemo__header">
    <button mat-icon-button (click)="goBack()" aria-label="Retour tableau de bord">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1>Mes règles Tuita</h1>
  </header>

  @for (section of sections; track section.id) {
    <mat-card class="cmemo__card">
      <mat-card-header>
        <mat-icon mat-card-avatar>{{ section.icon }}</mat-icon>
        <mat-card-title>{{ section.title }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <ul class="cmemo__rules">
          @for (rule of section.rules; track $index) {
            <li>{{ rule }}</li>
          }
        </ul>
      </mat-card-content>
    </mat-card>
  }

  <footer class="cmemo__footer">
    @if (certifiedAt(); as date) {
      <p class="cmemo__certified-at">Certifié le {{ date | date:'longDate' }}</p>
    }
    <button mat-stroked-button (click)="retakeQcm()">
      <mat-icon>refresh</mat-icon>
      Refaire le QCM
    </button>
    <button mat-flat-button color="primary" (click)="goBack()">
      Retour au tableau de bord
    </button>
  </footer>
</section>
