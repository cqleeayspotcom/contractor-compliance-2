<div class="not-found">
  <div class="not-found__card">
    <div class="not-found__icon-circle">
      <mat-icon>search_off</mat-icon>
    </div>
    <h1 class="not-found__code">404</h1>
    <h2 class="not-found__title">Page non trouvée</h2>
    <p class="not-found__text">La page que vous recherchez n'existe pas ou a été déplacée.</p>
    <button mat-raised-button color="primary" class="not-found__btn" (click)="goToDashboard()">
      <mat-icon>arrow_back</mat-icon>
      Retour au tableau de bord
    </button>
  </div>
</div>
