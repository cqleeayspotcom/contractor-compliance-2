<h2 mat-dialog-title>
  <mat-icon>replay</mat-icon>
  Replay massif des webhooks morts
</h2>

<div mat-dialog-content class="dlq-dlg">
  <p class="dlq-dlg__warning">
    <mat-icon>warning</mat-icon>
    <span>
      Cette action va relancer <strong>tous</strong> les webhooks en file morte (DLQ).
      À utiliser uniquement après une remontée de tuita.fr.
    </span>
  </p>

  <mat-form-field appearance="outline" class="dlq-dlg__field">
    <mat-label>Raison du replay (audit obligatoire)</mat-label>
    <textarea
      matInput
      rows="3"
      [ngModel]="reason()"
      (ngModelChange)="onReasonChange($event)"
      placeholder="Ex : tuita.fr remonté après incident webhook 2026-04-24"
    ></textarea>
    <mat-hint>{{ reason().length }}/10 caractères minimum</mat-hint>
  </mat-form-field>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Annuler</button>
  <button mat-flat-button color="warn" [disabled]="!canSubmit()" (click)="submit()">
    Replay all
  </button>
</div>
